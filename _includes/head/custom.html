<style>
/* =============================================
   ARCHIVAL PRECISION — Portfolio Redesign
   ============================================= */

:root {
  --bg:       #F3F0EA;
  --surface:  #FDFCF9;
  --text:     #1C1917;
  --text-2:   #78716C;
  --accent:   #1E5B70;
  --accent-w: #B45309;
  --border:   #E2DDD6;
  --border-2: #EDEAE4;
  --ease:     cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* --- Base --- */
body {
  background: var(--bg);
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  color: var(--text);
}

h1, h2, h3, h4, h5, h6 {
  font-family: 'Cormorant Garamond', Georgia, serif;
}

/* --- Masthead --- */
.masthead {
  background: var(--bg) !important;
  border-bottom: 1px solid var(--border) !important;
  box-shadow: none !important;
}

.greedy-nav {
  background: transparent !important;
}

.masthead__menu-item--lg a {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.3rem !important;
  font-weight: 600 !important;
  letter-spacing: 0.01em !important;
  color: var(--text) !important;
  text-transform: none !important;
}

.greedy-nav .visible-links a {
  font-family: 'IBM Plex Sans', sans-serif !important;
  font-size: 0.72rem !important;
  font-weight: 500 !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  color: var(--text-2) !important;
  transition: color 0.2s;
}

.greedy-nav .visible-links a:hover {
  color: var(--accent) !important;
}

.masthead__menu-item--apps a {
  color: var(--accent) !important;
}

/* --- Author sidebar --- */
.author__avatar img {
  border-radius: 50% !important;
  border: 2px solid var(--border) !important;
  box-shadow: 0 0 0 5px var(--bg), 0 0 0 7px var(--border) !important;
  transition: box-shadow 0.3s var(--ease) !important;
}

.author__avatar img:hover {
  box-shadow: 0 0 0 5px var(--bg), 0 0 0 7px var(--accent) !important;
}

.author__name {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.5rem !important;
  font-weight: 600 !important;
  letter-spacing: 0.02em !important;
  color: var(--text) !important;
}

.author__tagline {
  font-family: 'IBM Plex Sans', sans-serif !important;
  font-size: 0.77rem !important;
  color: var(--text-2) !important;
  line-height: 1.55 !important;
}

.author__urls-wrapper .btn--inverse {
  font-family: 'IBM Plex Mono', monospace !important;
  font-size: 0.62rem !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  background: transparent !important;
  border: 1px solid var(--border) !important;
  color: var(--text-2) !important;
  border-radius: 3px !important;
  transition: border-color 0.2s, color 0.2s !important;
  box-shadow: none !important;
}

.author__urls-wrapper .btn--inverse:hover {
  border-color: var(--accent) !important;
  color: var(--accent) !important;
  background: transparent !important;
}

.author__urls {
  background: var(--surface) !important;
  border: 1px solid var(--border-2) !important;
  border-radius: 6px !important;
}

.author__urls li a,
.author__desktop {
  font-family: 'IBM Plex Sans', sans-serif !important;
  font-size: 0.77rem !important;
  color: var(--text-2) !important;
}

.author__urls li a:hover {
  color: var(--accent) !important;
}

/* --- Page content base --- */
.page__content {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.95rem;
  line-height: 1.75;
}

/* Suppress the auto-rendered "About Me" h1 on the homepage */
body .page__title:first-of-type {
  display: none;
}

/* --- Home intro --- */
.home-intro {
  margin-bottom: 2.5rem;
  animation: hz-fadeUp 0.5s ease 0.05s both;
}

.home-intro__text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 1.02rem;
  line-height: 1.85;
  color: var(--text);
  max-width: 580px;
  margin: 0;
}

.home-intro__text a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(30,91,112,0.3);
  transition: border-color 0.2s;
}

.home-intro__text a:hover {
  border-bottom-color: var(--accent);
}

/* --- Section label --- */
.section-label {
  font-family: 'IBM Plex Mono', monospace !important;
  font-size: 0.66rem !important;
  font-weight: 500 !important;
  letter-spacing: 0.18em !important;
  text-transform: uppercase !important;
  color: var(--accent) !important;
  margin: 0 0 1.2rem !important;
  padding-bottom: 0.55rem !important;
  border-bottom: 1px solid var(--border) !important;
  line-height: 1 !important;
}

/* --- Research grid --- */
.research-areas {
  margin-bottom: 2.5rem;
  animation: hz-fadeUp 0.5s ease 0.15s both;
}

.research-grid {
  display: grid;
  grid-template-columns: 1fr;
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}

@media (min-width: 768px) {
  .research-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.research-item {
  background: var(--surface);
  padding: 1.5rem 1.25rem;
  position: relative;
  border-bottom: 1px solid var(--border);
  transition: background 0.22s var(--ease);
  overflow: hidden;
}

.research-item:last-child {
  border-bottom: none;
}

@media (min-width: 768px) {
  .research-item {
    border-bottom: none;
    border-right: 1px solid var(--border);
  }
  .research-item:last-child {
    border-right: none;
  }
}

.research-item::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.28s var(--ease);
}

.research-item:hover {
  background: #fff;
}

.research-item:hover::after {
  transform: scaleX(1);
}

.research-item__num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 0.65rem;
  opacity: 0.7;
}

.research-item__title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.18rem;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 0.45rem !important;
  line-height: 1.3;
}

.research-item__desc {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--text-2);
  line-height: 1.65;
  margin: 0 !important;
}

/* --- News timeline --- */
.news-areas {
  margin-bottom: 2.5rem;
  animation: hz-fadeUp 0.5s ease 0.25s both;
}

.news-timeline {
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  background: var(--surface);
}

.news-entry {
  display: grid;
  grid-template-columns: 80px 1fr;
  border-bottom: 1px solid var(--border);
}

.news-entry:last-child {
  border-bottom: none;
}

@media (max-width: 480px) {
  .news-entry {
    grid-template-columns: 1fr;
  }
}

.news-entry__date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-2);
  letter-spacing: 0.04em;
  padding: 0.85rem 0.7rem 0.85rem 1rem;
  background: var(--border-2);
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  white-space: nowrap;
  line-height: 1;
}

@media (max-width: 480px) {
  .news-entry__date {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1rem;
  }
}

.news-entry__text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.7;
  margin: 0;
  padding: 0.85rem 1rem;
}

.news-entry__text a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(30,91,112,0.28);
  transition: border-color 0.2s;
}

.news-entry__text a:hover {
  border-bottom-color: var(--accent);
}

/* --- Service --- */
.service-area {
  margin-bottom: 2rem;
  animation: hz-fadeUp 0.5s ease 0.35s both;
}

.service-text {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.86rem;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 0.45rem !important;
}

.service-role {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(30,91,112,0.08);
  padding: 0.12rem 0.42rem;
  border-radius: 2px;
  margin-right: 0.65rem;
  vertical-align: middle;
}

/* --- Page footer / meta --- */
.page__meta {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--text-2);
}

/* --- Entrance animations --- */
@keyframes hz-fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<!-- end custom head snippets -->
