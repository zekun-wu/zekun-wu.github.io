<style>
/* ===================================================
   YOUR DIGITAL STORY — exact CSS replication
   =================================================== */

/* --- Variables (dark default) --- */
:root {
  --background:      oklch(0.145 0 0);
  --foreground:      oklch(0.96 0 0);
  --surface:         oklch(0.205 0 0);
  --muted-fg:        oklch(0.62 0 0);
  --gold:            oklch(0.76 0.12 85);
  --gold-light:      oklch(0.86 0.11 85);
}

/* --- Light mode --- */
:root.light {
  --background:  oklch(0.97 0.005 85);
  --foreground:  oklch(0.22 0 0);
  --surface:     oklch(0.93 0.008 85);
  --muted-fg:    oklch(0.45 0 0);
  --gold:        oklch(0.55 0.13 60);
  --gold-light:  oklch(0.45 0.14 55);
}

/* --- Animations --- */
@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

/* --- CRT (on body) --- */
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 50;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0, transparent 2px,
    rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 3px
  );
}
body::after {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 49;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
}
:root.light body::before,
:root.light body::after { display: none; }

/* --- Remove focus outline on click --- */
* { -webkit-tap-highlight-color: transparent; }
*:focus, *:focus-visible, *:focus-within {
  outline: 0 !important;
  outline-width: 0 !important;
}

/* --- Base --- */
html, body {
  background: var(--background) !important;
  color: var(--foreground);
  font-family: 'IBM Plex Mono', monospace;
  -webkit-font-smoothing: antialiased;
  padding: 0 !important;
  margin: 0;
}
h1,h2,h3,h4,h5,h6 { font-family: 'IBM Plex Mono', monospace; line-height: inherit; }
a { color: var(--gold); transition: color 0.15s; }
a:hover { color: var(--gold-light) !important; }
::selection { background: oklch(0.76 0.12 85 / 0.3); color: var(--gold-light); }

/* --- Hide Jekyll chrome --- */
.masthead, .page__footer, .sidebar { display: none !important; }
button:not(#zw-owl) { display: none !important; }
#main, .page, .page__inner-wrap, .page__content {
  float: none !important; width: 100% !important;
  max-width: none !important;
  padding: 0 !important; margin: 0 !important;
  background: transparent !important;
}

/* --- Page wrapper (matches crt + container) --- */
/* font-size here, NOT on html, so 1rem stays 16px for all rem spacing calculations */
.zw-page { min-height: 100vh; font-size: 13.5px; line-height: 1.75; }
.zw-wrap {
  max-width: 768px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem;
}
@media (min-width: 640px) {
  .zw-wrap { padding-left: 2rem; padding-right: 2rem; }
}

/* --- Header (homepage) --- */
.zw-header {
  display: flex; flex-direction: column; gap: 0.75rem;
  padding-bottom: 1rem;
  border-bottom: 1px dashed oklch(0.76 0.12 85 / 0.3);
  font-size: 13.5px;
}
@media (min-width: 640px) {
  .zw-header { flex-direction: row; align-items: center; }
}
.zw-h-name { color: var(--gold); text-decoration: none; }
.zw-h-name:hover { color: var(--gold-light) !important; }
.zw-h-sub  { color: var(--muted-fg); }
.zw-caret  {
  display: inline-block; width: 0.55em; height: 1em;
  background: var(--gold); vertical-align: -0.15em;
  margin-left: 0.5rem;
  animation: blink 1s steps(2) infinite;
}
.zw-nav {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 0.25rem 1rem; font-size: 12px; color: var(--muted-fg);
}
@media (min-width: 640px) { .zw-nav { margin-left: auto; } }
.zw-nav a { color: var(--muted-fg); text-decoration: none; transition: color 0.15s; }
.zw-nav a:hover, .zw-nav a.zw-active { color: var(--gold-light) !important; }
.zw-nav a:focus, .zw-page-hd a:focus, .zw-h-name:focus { outline: none; }

/* Owl toggle button */
.zw-owl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px; color: oklch(0.76 0.12 85 / 0.7);
  background: none; border: none; cursor: pointer;
  line-height: 1.05; padding: 0; select-none: all;
  transition: color 0.15s;
}
.zw-owl:hover { color: var(--gold-light) !important; }
.zw-owl pre {
  margin: 0; padding: 0; display: inline-block;
  font-family: inherit; font-size: inherit; background: none;
  overflow: hidden;
}
.zw-owl-lbl {
  margin-left: 0.5rem; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.2em;
  opacity: 0.6; vertical-align: top;
}
@media (min-width: 640px) { .zw-owl { margin-left: 1rem; } }

/* --- Page header (publications/projects/apps) --- */
.zw-page-hd {
  display: flex; flex-direction: column; gap: 0.75rem;
  padding-bottom: 1rem;
  border-bottom: 1px dashed oklch(0.76 0.12 85 / 0.3);
}
@media (min-width: 640px) {
  .zw-page-hd { flex-direction: row; align-items: center; justify-content: space-between; }
}

/* --- About section --- */
.zw-about { padding-top: 2.5rem; padding-bottom: 3rem; }
.zw-portrait-grid {
  display: grid; grid-template-columns: 1fr; gap: 1.5rem;
}
@media (min-width: 640px) {
  .zw-portrait-grid { grid-template-columns: 1fr 2fr; }
}
.zw-portrait {
  width: 100%; max-width: 200px; aspect-ratio: 4/5;
  object-fit: cover;
  position: relative; z-index: 51;
  border-radius: 0 !important;
  filter: none !important;
  mix-blend-mode: normal;
  transition: none !important;
  box-shadow: none !important;
}
.zw-bio { color: oklch(0.96 0 0 / 0.9); }
.zw-bio p + p { margin-top: 0.6rem; }
.zw-bio strong { color: var(--gold); font-weight: 600; }
.zw-bio a {
  color: var(--gold-light);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.4);
  text-underline-offset: 2px;
}
.zw-bio a:hover { color: var(--gold) !important; }
:root.light .zw-bio,
:root.light .zw-r-body,
:root.light .zw-a-cap,
:root.light .zw-page-intro p { color: oklch(0.22 0 0 / 0.9); }

/* Links strip */
.zw-links {
  margin-top: 2.5rem; padding-top: 1rem; padding-left: 0; margin-bottom: 0;
  border-top: 1px dashed oklch(0.76 0.12 85 / 0.2);
  display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem;
  font-size: 12.5px; list-style: none;
}
.zw-lk { color: oklch(0.76 0.12 85 / 0.6); }
.zw-links a {
  color: var(--foreground);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.3);
  text-underline-offset: 2px;
}
.zw-links a:hover { color: var(--gold-light) !important; }

/* --- Sections --- */
.zw-section {
  padding-top: 2rem; padding-bottom: 2rem;
  border-top: 1px dashed oklch(0.76 0.12 85 / 0.2);
}
.zw-section-title {
  color: var(--gold); font-size: 12.5px;
  text-transform: uppercase; letter-spacing: 0.25em;
  margin-bottom: 1.25rem !important; font-weight: 400;
}

/* 12-col grid */
.g12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0.75rem; }

/* Research */
.zw-r-list { list-style: none; margin: 0; padding: 0; }
.zw-r-list > li + li { margin-top: 1.25rem; }
.zw-r-label { grid-column: span 12; color: oklch(0.76 0.12 85 / 0.8); }
.zw-r-body  { grid-column: span 12; color: oklch(0.96 0 0 / 0.9); }
@media (min-width: 640px) {
  .zw-r-label { grid-column: span 3; }
  .zw-r-body  { grid-column: span 9; }
}

/* News */
.zw-n-list { list-style: none; margin: 0; padding: 0; }
.zw-n-list > li { padding-top: 0.375rem; padding-bottom: 0.375rem; }
.zw-n-date { grid-column: span 3; color: oklch(0.76 0.12 85 / 0.7); }
.zw-n-body { grid-column: span 9; }
@media (min-width: 640px) {
  .zw-n-date { grid-column: span 2; }
  .zw-n-body { grid-column: span 10; }
}
.zw-n-body a {
  color: var(--gold);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.4);
  text-underline-offset: 2px;
}
.zw-n-body a:hover { color: var(--gold-light) !important; }

/* Service */
.zw-s-list { list-style: none; margin: 0; padding: 0; }
.zw-s-list > li + li { margin-top: 0.5rem; }
.zw-s-label { grid-column: span 12; color: oklch(0.76 0.12 85 / 0.7); }
.zw-s-body  { grid-column: span 12; }
@media (min-width: 640px) {
  .zw-s-label { grid-column: span 3; }
  .zw-s-body  { grid-column: span 9; }
}

/* Footer */
.zw-footer {
  margin-top: 3rem; padding-top: 1rem;
  border-top: 1px dashed oklch(0.76 0.12 85 / 0.3);
  display: flex; flex-direction: column; gap: 0.5rem;
  font-size: 11.5px; color: var(--muted-fg);
}
@media (min-width: 640px) {
  .zw-footer { flex-direction: row; justify-content: space-between; }
}
.zw-footer a { color: var(--muted-fg); text-decoration: none; }
.zw-footer a:hover { color: var(--gold) !important; }

/* --- Publications --- */
.zw-pub-section {
  padding-top: 1.5rem; padding-bottom: 1.5rem;
  border-top: 1px dashed oklch(0.76 0.12 85 / 0.2);
}
.zw-pub-year {
  color: oklch(0.76 0.12 85 / 0.8); font-size: 12.5px;
  letter-spacing: 0.2em; margin-bottom: 1rem !important; font-weight: 400;
}
.zw-pub-list { list-style: none; margin: 0; padding: 0; }
.zw-pub-list > li + li { margin-top: 1.25rem; }
.zw-p-tag   { grid-column: span 12; color: oklch(0.76 0.12 85 / 0.6); font-size: 12px; }
.zw-p-body  { grid-column: span 12; }
@media (min-width: 640px) {
  .zw-p-tag  { grid-column: span 2; }
  .zw-p-body { grid-column: span 10; }
}
.zw-p-link {
  color: var(--foreground);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.3);
  text-underline-offset: 2px;
}
.zw-p-link:hover { color: var(--gold-light) !important; }
.zw-p-venue { color: var(--muted-fg); font-style: italic; font-size: 12.5px; margin-top: 0.1rem; }

/* --- Projects / Apps --- */
.zw-article {
  padding-top: 2.5rem; padding-bottom: 2.5rem;
  border-top: 1px dashed oklch(0.76 0.12 85 / 0.2);
}
.zw-article > * + * { margin-top: 1.25rem; }
.zw-article > p { margin-bottom: 0; } /* reset browser default on link/website paragraphs */

/* margin:0 resets browser default <p> margins; space-y-1 = 0.25rem gap before title */
.zw-a-prefix { color: oklch(0.76 0.12 85 / 0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; margin: 0; }
.zw-a-title  { color: var(--gold-light); font-size: 15px; font-weight: 400; margin: 0.25rem 0 0 !important; }

/* margin-top: 0.5rem matches Tailwind mt-2 that overrides space-y-5 on the figure */
.zw-a-figure {
  display: block;           /* override theme figure { display: flex } */
  margin: 0.5rem 0 0;
  border: 1px solid oklch(0.76 0.12 85 / 0.15);
  background: oklch(0.205 0 0 / 0.5);
}
.zw-a-img {
  width: 100%; display: block;
  border-radius: 0;         /* override theme figure img { border-radius: 4px } */
  margin-bottom: 0;         /* override theme figure img { margin-bottom: 1em } */
  transition: none;         /* override theme img { transition: all 0.2s } */
}
:root.light .zw-a-figure {
  background: #ffffff;
  border-color: oklch(0.72 0.1 72 / 0.4);
  box-shadow: 0 1px 3px oklch(0.55 0.13 60 / 0.08), 0 4px 14px oklch(0.55 0.13 60 / 0.07);
}

/* pb-2 (0.5rem) for single-line projects; apps adds .zw-a-cap-apps for pb-3 */
.zw-a-cap {
  color: oklch(0.96 0 0 / 0.9);
  padding: 0.75rem 1rem 0.5rem;
  border-bottom: 1px dashed oklch(0.76 0.12 85 / 0.15);
  font-size: 13.5px;
  font-family: 'IBM Plex Mono', monospace;
  font-style: normal;
  margin: 0;
  background: oklch(0.17 0.008 85 / 0.7);
}
.zw-a-cap-apps { padding-bottom: 0.75rem; }
:root.light .zw-a-cap {
  color: oklch(0.22 0 0 / 0.9);
  border-bottom-color: oklch(0.72 0.1 72 / 0.3);
  background: oklch(0.94 0.018 85);
}
.zw-a-cap > p { margin: 0 0 0.75rem; }
.zw-a-cap > p:last-child { margin-bottom: 0; }
.zw-a-img-wrap { padding: 0; }
.zw-a-links { font-size: 12.5px; margin-bottom: 0; }
.zw-a-link {
  color: oklch(0.76 0.12 85 / 0.8);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.3);
  text-underline-offset: 2px;
  margin-right: 1rem;
}
.zw-a-link:hover { color: var(--gold-light) !important; }
:root.light .zw-a-link { color: oklch(0.55 0.13 60 / 0.8); }
/* Website link: gold-light by default, darkens to gold on hover (inverted from Paper/Code) */
.zw-a-link-site {
  color: var(--gold-light);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.4);
  text-underline-offset: 2px;
}
.zw-a-link-site:hover { color: var(--gold) !important; }
:root.light .zw-a-link-site { text-decoration-color: oklch(0.55 0.13 60 / 0.4); }
.zw-a-status { color: oklch(0.76 0.12 85 / 0.6); font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; }
:root.light .zw-a-status { color: oklch(0.55 0.13 60 / 0.6); }
:root.light .zw-article { border-top-color: oklch(0.55 0.13 60 / 0.2); }
:root.light .zw-a-prefix { color: oklch(0.55 0.13 60 / 0.5); }

/* --- Page title (Publications / Projects / Apps) --- */
.zw-page-title {
  color: var(--gold); font-size: 12.5px;
  text-transform: uppercase; letter-spacing: 0.25em;
  margin: 0 0 1rem !important; font-weight: 400;
}
.zw-page-intro { padding-top: 2.5rem; padding-bottom: 1.5rem; }
.zw-page-intro p { color: oklch(0.96 0 0 / 0.9); }
.zw-page-intro a {
  color: var(--gold-light);
  text-decoration: underline;
  text-decoration-color: oklch(0.76 0.12 85 / 0.4);
  text-underline-offset: 2px;
}
.zw-page-intro a:hover { color: var(--gold) !important; }
</style>

<script>
(function () {
  var t = localStorage.getItem('zw-theme') || 'dark';
  if (t === 'light') document.documentElement.classList.add('light');

  function renderOwl() {
    var b = document.getElementById('zw-owl');
    if (!b) return;
    var light = document.documentElement.classList.contains('light');
    b.innerHTML =
      '<pre>  ,___,\n  {' + (light ? '-,-' : '◉,◉') + '}\n  /)_)</pre>' +
      '<span class="zw-owl-lbl">' + (light ? '// day' : '// night') + '</span>';
  }

  function updatePortrait() {
    var p = document.getElementById('zw-portrait');
    if (!p) return;
    var light = document.documentElement.classList.contains('light');
    p.src = light ? p.dataset.srcLight : p.dataset.srcDark;
  }

  window.zwToggle = function () {
    var light = document.documentElement.classList.contains('light');
    document.documentElement.classList.toggle('light', !light);
    localStorage.setItem('zw-theme', light ? 'dark' : 'light');
    renderOwl();
    updatePortrait();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { renderOwl(); updatePortrait(); });
  } else {
    renderOwl();
    updatePortrait();
  }
})();
</script>

<!-- end custom head snippets -->
